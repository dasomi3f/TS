
<style>

    <text x="520" y="139" fill="var(--color-text-secondary)" font-size="11" font-family="sans-serif">엘라스토머</text>
    <line x1="310" y1="291" x2="268" y2="278" stroke="#888" stroke-width="0.5" stroke-dasharray="3 2"/>
    <text x="145" y="274" text-anchor="middle" fill="var(--color-text-secondary)" font-size="11" font-family="sans-serif">홀 센서</text>

    <!-- B벡터 레이블 라인 -->

    <!-- ESP32 -->

    <text x="70" y="356" text-anchor="middle" fill="#50a050" font-size="8" font-family="sans-serif">신호처리</text>
    <line x1="110" y1="320" x2="160" y2="315" stroke="#70c070" stroke-width="1" stroke-dasharray="3 2" opacity="0.5"/>

    <!-- 축 -->

    <text x="606" y="358" text-anchor="middle" fill="var(--color-text-secondary)" font-size="10" font-family="sans-serif">Z</text>

    <text x="641" y="316" fill="#E2603A" font-size="10" font-family="sans-serif">X</text>
    <line x1="606" y1="312" x2="588" y2="285" stroke="#2E8B6E" stroke-width="1.2" stroke-dasharray="3 2" opacity="0.7"/>
    <text x="592" y="278" fill="#2E8B6E" font-size="10" font-family="sans-serif">Y</text>
  </svg>

  <div class="legend">
    <span><div class="ldot" style="background:#3B7CD4;border-top:2px dashed #3B7CD4"></div> 자기력선 (자석 고유, 자석과 함께 이동)</span>
    <span><div class="ldot" style="background:#E85D24"></div> B⃗ 벡터 @ 홀 센서 (감지값)</span>

  <div class="btns">
    <button class="mode-btn active" onclick="setMode('idle')" id="btn-idle">대기</button>
    <button class="mode-btn" onclick="setMode('z')" id="btn-z">Z축 누름</button>
    <button class="mode-btn" onclick="setMode('x')" id="btn-x">X축 전단</button>
    <button class="mode-btn" onclick="setMode('y')" id="btn-y">Y축 전단</button>
    <button class="mode-btn" onclick="setMode('multi')" id="btn-multi">복합</button>
  </div>
  <div class="readout">
    <div class="val-box"><div class="val-label">Bx (홀)</div><div class="val-num val-x" id="vx">0.0</div></div>
    <div class="val-box"><div class="val-label">By (홀)</div><div class="val-num val-y" id="vy">0.0</div></div>
    <div class="val-box"><div class="val-label">Bz (홀)</div><div class="val-num val-z" id="vz">0.0</div></div>
  </div>
  <div class="field-bar-wrap">
    <span>|B| @ 홀 센서</span>
    <div class="field-bar"><div class="field-bar-fill" id="fbar" style="width:8%;background:#E85D24"></div></div>
    <span id="fbar-val">8%</span>
  </div>
  <div class="desc" id="desc">자석 정위치. 홀 센서에서 B⃗는 약한 -Z 방향.</div>
</div>

<script>
const EL_BOT=308, EL_H0=198;

// 엘라스토머 경로 (비압축성)
function elPath(c,s){
  const r=14, newH=EL_H0-c*36, newW=(EL_H0/newH)*280;
  const top=EL_BOT-newH, halfW=newW/2;
  const lx=340-halfW, rx=340+halfW;
  const ts=s*28, bulge=c*18, mid=(top+EL_BOT)/2;
  const tl=lx+ts, tr=rx+ts;
  return[`M ${tl+r},${top}`,`L ${tr-r},${top}`,
    `Q ${tr},${top} ${tr},${top+r}`,
    `Q ${rx+bulge},${mid} ${rx},${EL_BOT}`,
    `L ${lx},${EL_BOT}`,
    `Q ${lx-bulge},${mid} ${tl},${top+r}`,
    `Q ${tl},${top} ${tl+r},${top} Z`].join(' ');
}

// 쌍극자 자기장 근사 (2D)
// 자석 중심 (mx, mz), 홀 센서 (hx=340, hz=293), 자석 모멘트 방향: +Z (N이 위)
// B ∝ [3(m·r̂)r̂ - m] / r³
function dipoleField(mx, mz) {
  const hx=340, hz=293;
  const dx=hx-mx, dz=hz-mz;          // 자석→홀센서 벡터
  const r=Math.sqrt(dx*dx+dz*dz);
  if(r<1) return {bx:0, bz:1, mag:1};
  const rx=dx/r, rz=dz/r;            // 단위벡터
  // 모멘트 방향: mz=+1 (N극 위, S극 아래 → 자석 아래쪽 (홀센서 방향)이 S극)
  // 쌍극자 모멘트 m = (0, -1) in (x,z) since N is at top
  const mx_m=0, mz_m=-1;
  const mdotr = mx_m*rx + mz_m*rz;
  const bx = (3*mdotr*rx - mx_m) / (r*r*r);
  const bz = (3*mdotr*rz - mz_m) / (r*r*r);
  const mag = Math.sqrt(bx*bx+bz*bz);
  return {bx, bz, mag};
}

const HALL_X=340, HALL_Z=293;
const MAG_CX0=340, MAG_CZ0=214; // 자석 중심 초기 위치

const modes={
  idle: {c:0,   s:0,   dx:0,  dz:0,  fy:false, fz:false, fx:false, desc:'자석 정위치. 홀 센서의 B⃗는 작은 -Z 성분만 감지.'},
  z:    {c:0.78,s:0,   dx:0,  dz:32, fy:false, fz:true,  fx:false, desc:'자석 하강 → 홀 센서에 가까워짐 → |B|↑, Bz 급증.'},
  x:    {c:0,   s:0.9, dx:25, dz:0,  fy:false, fz:false, fx:true,  desc:'자석 측방 이동 → 홀 센서에서 B⃗가 기울어짐 → Bx 증가.'},
  y:    {c:0,   s:0,   dx:0,  dz:-8, fy:true,  fz:false, fx:false, desc:'Y 전단 → 자석 약간 상승 → B⃗ 방향 변화, Bz 감소.'},
  multi:{c:0.5, s:0.5, dx:14, dz:18, fy:false, fz:true,  fx:true,  desc:'복합 자극 → Bx, Bz 동시 변화 → ESP32가 3D 벡터 연산.'}
};

let mode='idle', t=0, tgt=modes.idle;
let cur={c:0,s:0,dx:0,dz:0};
function lerp(a,b,f){return a+(b-a)*f}

function setMode(m){
  mode=m; tgt=modes[m];
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+m).classList.add('active');
  document.getElementById('desc').textContent=tgt.desc;
  document.getElementById('force-arrow').style.opacity   = tgt.fz?'1':'0';
  document.getElementById('shear-x-arrow').style.opacity = tgt.fx?'1':'0';
  document.getElementById('shear-y-arrow').style.opacity = tgt.fy?'1':'0';
  if(tgt.fx){
    const d=tgt.dx>0?1:-1;
    document.getElementById('sx-line').setAttribute('x1',d>0?200:480);
    document.getElementById('sx-line').setAttribute('x2',d>0?248:432);
    document.getElementById('sx-label').setAttribute('x',d>0?185:496);
    document.getElementById('sx-label').setAttribute('text-anchor',d>0?'end':'start');
  }
}

function animate(){
  t++;
  const f=0.07, pls=Math.sin(t*0.08)*0.5+0.5, wgl=Math.sin(t*0.05);

  cur.c  = lerp(cur.c,  tgt.c,  f);
  cur.s  = lerp(cur.s,  tgt.s,  f);
  cur.dx = lerp(cur.dx, tgt.dx, f);
  cur.dz = lerp(cur.dz, tgt.dz, f);

  // 엘라스토머
  document.getElementById('elastomer').setAttribute('d', elPath(cur.c, cur.s));
  const newH=EL_H0-cur.c*36;
  document.getElementById('el-label').setAttribute('y', EL_BOT-newH+22);

  // 자석 이동
  document.getElementById('magnet-group').setAttribute('transform',
    `translate(${cur.dx}, ${cur.dz})`);

  // === 자석 현재 중심 ===
  const mcx = MAG_CX0 + cur.dx;
  const mcz = MAG_CZ0 + cur.dz;

  // === 자기력선: N극(위)에서 나와 S극(아래)으로 들어오는 루프 ===
  // N극 위치: (mcx, mcz-22), S극 위치: (mcx, mcz+22)
  const nx=mcx, nz=mcz-22; // N극
  const sx=mcx, sz=mcz+22; // S극
  const flOff=(t*0.9)%16;

  // 바깥 루프 2개 (좌우 크게)
  document.getElementById('fl1').setAttribute('d',
    `M${nx},${nz} C${nx+90},${nz-50} ${sx+90},${sz+50} ${sx},${sz}`);
  document.getElementById('fl2').setAttribute('d',
    `M${nx},${nz} C${nx-90},${nz-50} ${sx-90},${sz+50} ${sx},${sz}`);
  // 중간 루프 2개
  document.getElementById('fl3').setAttribute('d',
    `M${nx},${nz} C${nx+50},${nz-30} ${sx+50},${sz+30} ${sx},${sz}`);
  document.getElementById('fl4').setAttribute('d',
    `M${nx},${nz} C${nx-50},${nz-30} ${sx-50},${sz+30} ${sx},${sz}`);
  // 내부 (N→S 직결)
  document.getElementById('fl5').setAttribute('d',
    `M${nx},${nz} C${nx+20},${nz+10} ${sx+20},${sz-10} ${sx},${sz}`);
  document.getElementById('fl6').setAttribute('d',
    `M${nx},${nz} C${nx-20},${nz+10} ${sx-20},${sz-10} ${sx},${sz}`);
  ['fl1','fl2','fl3','fl4','fl5','fl6'].forEach(id=>
    document.getElementById(id).setAttribute('stroke-dashoffset', -flOff));

  // === 홀 센서 자기장 벡터 계산 ===
  const {bx, bz, mag} = dipoleField(mcx, mcz);

  // 정규화 후 화살표 길이 스케일 (mag 기준)
  const refMag0 = dipoleField(MAG_CX0, MAG_CZ0).mag; // 기준 세기
  const scale = Math.min(mag/refMag0, 6) * 32;       // 최대 32px, 6배 증폭 상한
  const bxN = bx/mag, bzN = bz/mag;

  // 화살표 (홀 센서 중심에서 출발)
  const vx2 = HALL_X + bxN*scale;
  const vz2 = HALL_Z + bzN*scale;
  document.getElementById('hall-vec-line').setAttribute('x2', vx2);
  document.getElementById('hall-vec-line').setAttribute('y2', vz2);

  // 감지 링 (세기에 따라 반짝임)
  const fi = Math.min(mag/refMag0, 1);
  const ring = document.getElementById('hall-sense-ring');
  ring.style.opacity = 0.4 + pls*0.5*fi;
  ring.setAttribute('r', 8 + fi*6);
  ring.setAttribute('stroke-width', 1 + fi*1.5);

  // 벡터 레이블
  const vecVis = mag > refMag0*0.5 ? 1 : Math.max(0, (mag/refMag0 - 0.1)/0.4);
  document.getElementById('hall-vec-label').style.opacity = vecVis;
  document.getElementById('vec-leader').style.opacity = vecVis*0.6;

  // 홀 센서 glow
  document.getElementById('hall-chip').style.filter =
    fi>0.15 ? `drop-shadow(0 0 ${(fi*0.6+pls*fi*0.4)*8}px #E85D24)` : 'none';

  // 수치 출력 (dipole field 값으로)
  const norm = refMag0;
  document.getElementById('vx').textContent = (bx/norm*10).toFixed(1);
  document.getElementById('vy').textContent = (cur.s*2.8 + wgl*(mode!=='idle'?0.08:0)).toFixed(1);
  document.getElementById('vz').textContent = (bz/norm*10).toFixed(1);
  const fp=Math.round(Math.min(mag/refMag0*100, 100));
  document.getElementById('fbar').style.width=fp+'%';
  document.getElementById('fbar-val').textContent=fp+'%';

  // 화살표 펄스
  if(tgt.fz) document.getElementById('force-arrow').style.opacity   = 0.6+pls*0.4;
  if(tgt.fx) document.getElementById('shear-x-arrow').style.opacity = 0.6+pls*0.4;
  if(tgt.fy) document.getElementById('shear-y-arrow').style.opacity = 0.6+pls*0.4;

  requestAnimationFrame(animate);
}
animate();
</script>
